<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>College Station Weekly Temperature Forecast - Highcharts</title>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@12/highcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@12/modules/series-label.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@12/modules/exporting.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f0f4f8;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }
      #container {
        min-width: 310px;
        max-width: 860px;
        width: 100%;
        height: 460px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>

    <script>
      Highcharts.chart('container', {

        chart: {
          type: 'line',
          style: { fontFamily: 'system-ui, sans-serif' },
          backgroundColor: '#ffffff',
          borderRadius: 12
        },

        title: {
          text: 'College Station Weekly Temperature Forecast',
          style: { fontWeight: '700', fontSize: '18px', color: '#1a2a3a' }
        },

        subtitle: {
          text: 'Daily High & Low Temperatures (\u00B0F)',
          style: { color: '#6b8fa8', fontSize: '13px' }
        },

        xAxis: {
          categories: ['Sat', 'Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
          title: { text: 'Day of Week', style: { color: '#6b8fa8' } },
          labels: { style: { color: '#3a5a74', fontWeight: '600' } },
          lineColor: '#dce8f0',
          tickColor: '#dce8f0'
        },

        yAxis: {
          title: { text: 'Temperature (\u00B0F)', style: { color: '#6b8fa8' } },
          min: 40,
          max: 90,
          gridLineColor: '#eaf2f8',
          labels: {
            style: { color: '#3a5a74' },
            format: '{value}\u00B0F'
          }
        },

        tooltip: {
          shared: true,
          backgroundColor: '#0f1923',
          borderColor: '#2a4a63',
          borderRadius: 8,
          style: { color: '#e8f4fd' },
          valueSuffix: '\u00B0F',
          headerFormat: '<span style="font-size:13px;font-weight:700;color:#7ab8d8">{point.key}</span><br/>'
        },

        legend: {
          layout: 'vertical',
          align: 'right',
          verticalAlign: 'middle',
          itemStyle: { fontWeight: '600', color: '#3a5a74' }
        },

        plotOptions: {
          series: {
            label: { connectorAllowed: false },
            dataLabels: {
              enabled: true,
              format: '{y}\u00B0',
              style: { fontSize: '11px', fontWeight: '600', textOutline: 'none' }
            },
            marker: { radius: 6, lineWidth: 2, lineColor: '#ffffff' }
          }
        },

        series: [
          {
            name: 'Highest',
            data: [82, 81, 81, 70, 77, 78, 79, 80],
            color: '#2196F3',
            dataLabels: { style: { color: '#2196F3' } },
            marker: { symbol: 'circle', fillColor: '#2196F3' }
          },
          {
            name: 'Lowest',
            data: [67, 59, 50, 47, 51, 60, 66, 66],
            color: '#673AB7',
            dataLabels: { style: { color: '#673AB7' } },
            marker: { symbol: 'diamond', fillColor: '#673AB7' }
          }
        ],

        responsive: {
          rules: [{
            condition: { maxWidth: 500 },
            chartOptions: {
              legend: { layout: 'horizontal', align: 'center', verticalAlign: 'bottom' }
            }
          }]
        },

        credits: { enabled: true }
      });
    </script>
  </body>
</html>
