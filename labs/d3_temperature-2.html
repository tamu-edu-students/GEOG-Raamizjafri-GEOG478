<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>College Station Weekly Temperature Forecast - D3</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1923;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 { color: #e8f4fd; font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
    .subtitle { color: #7a9bb5; font-size: 13px; margin-bottom: 32px; text-align: center; }
    #chart-container {
      background: #162230; border-radius: 16px; padding: 32px 36px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4); border: 1px solid #1e3347;
      width: 100%; max-width: 820px;
    }
    svg { display: block; width: 100%; }
    .bar-high { fill: #4da8da; transition: fill 0.15s; cursor: pointer; }
    .bar-high:hover { fill: #6dc0ee; }
    .bar-low  { fill: #7c5cba; transition: fill 0.15s; cursor: pointer; }
    .bar-low:hover  { fill: #9b7fd4; }
    .tick-label { fill: #6b8fa8; font-size: 11px; }
    .day-label  { fill: #8aaec8; font-size: 12px; font-weight: 600; }
    .val-label-high { fill: #4da8da; font-size: 11px; font-weight: 600; }
    .val-label-low  { fill: #9b7fd4; font-size: 11px; font-weight: 600; }
    .grid-line { stroke: #1e3347; stroke-dasharray: 3,3; }
    .legend { display: flex; gap: 24px; justify-content: center; margin-top: 18px; }
    .legend-item { display: flex; align-items: center; gap: 8px; color: #b0c8dc; font-size: 13px; font-weight: 600; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
    .tooltip {
      position: fixed; background: #0a1520; border: 1px solid #2a4a63;
      border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #e8f4fd;
      pointer-events: none; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 100;
    }
    .tooltip strong { display: block; margin-bottom: 3px; color: #7ab8d8; }
  </style>
</head>
<body>
  <h1>College Station Weekly Temperature Forecast</h1>
  <p class="subtitle">7-Day High / Low Temperatures (&#176;F)</p>
  <div id="chart-container">
    <svg id="chart" viewBox="0 0 760 340" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#4da8da;"></div> High Temp (&#176;F)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7c5cba;"></div> Low Temp (&#176;F)</div>
    </div>
  </div>
  <div class="tooltip" id="tooltip"></div>
  <script>
    const days  = ['Sat','Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const highs = [82,81,81,70,77,78,79,80];
    const lows  = [67,59,50,47,51,60,66,66];
    const W=760,H=340,ml=52,mr=20,mt=20,mb=45;
    const cw=W-ml-mr, ch=H-mt-mb;
    const yMin=40, yMax=90;
    const groupW=cw/days.length, barW=groupW*0.32, gap=groupW*0.04;
    function yPos(v){ return mt+ch-((v-yMin)/(yMax-yMin))*ch; }
    function barH(v){ return ((v-yMin)/(yMax-yMin))*ch; }
    const svg=document.getElementById('chart');
    const ns='http://www.w3.org/2000/svg';
    function el(tag,attrs,parent){const e=document.createElementNS(ns,tag);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);if(parent)parent.appendChild(e);return e;}
    function txt(c,attrs,parent){const e=el('text',attrs,parent);e.textContent=c;return e;}
    // grid + y ticks
    [40,50,60,70,80,90].forEach(t=>{
      const y=yPos(t);
      el('line',{x1:ml,y1:y,x2:W-mr,y2:y,class:'grid-line'},svg);
      txt(t+'\u00B0',{x:ml-8,y:y+4,class:'tick-label','text-anchor':'end'},svg);
    });
    // axis label
    const al=txt('Temperature (\u00B0F)',{x:13,y:mt+ch/2,class:'tick-label','text-anchor':'middle',transform:`rotate(-90,13,${mt+ch/2})`},svg);
    // tooltip
    const tooltip=document.getElementById('tooltip');
    function showTip(e,day,label,val){tooltip.style.display='block';tooltip.innerHTML=`<strong>${day}</strong>${label}: ${val}\u00B0F`;moveTip(e);}
    function moveTip(e){tooltip.style.left=(e.clientX+14)+'px';tooltip.style.top=(e.clientY-38)+'px';}
    function hideTip(){tooltip.style.display='none';}
    // bars
    days.forEach((day,i)=>{
      const cx=ml+i*groupW+groupW/2;
      const xH=cx-gap/2-barW, xL=cx+gap/2;
      const rh=el('rect',{x:xH,width:barW,rx:3,y:yPos(highs[i]),height:barH(highs[i]),class:'bar-high'},svg);
      rh.addEventListener('mouseover',e=>showTip(e,day,'High',highs[i]));
      rh.addEventListener('mousemove',moveTip);
      rh.addEventListener('mouseout',hideTip);
      const rl=el('rect',{x:xL,width:barW,rx:3,y:yPos(lows[i]),height:barH(lows[i]),class:'bar-low'},svg);
      rl.addEventListener('mouseover',e=>showTip(e,day,'Low',lows[i]));
      rl.addEventListener('mousemove',moveTip);
      rl.addEventListener('mouseout',hideTip);
      txt(highs[i]+'\u00B0',{x:xH+barW/2,y:yPos(highs[i])-5,class:'val-label-high','text-anchor':'middle'},svg);
      txt(lows[i]+'\u00B0',{x:xL+barW/2,y:yPos(lows[i])-5,class:'val-label-low','text-anchor':'middle'},svg);
      txt(day,{x:cx,y:H-mb+18,class:'day-label','text-anchor':'middle'},svg);
    });
    el('line',{x1:ml,y1:mt+ch,x2:W-mr,y2:mt+ch,stroke:'#1e3347','stroke-width':1},svg);
  </script>
</body>
</html>
