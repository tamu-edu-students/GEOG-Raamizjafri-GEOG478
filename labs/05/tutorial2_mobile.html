<!DOCTYPE html>
<html>
<head>
    <title>Tutorial 2: Leaflet on Mobile</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        #header {
            background: #27ae60;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
        }
        #map {
            width: 100%;
            height: calc(100% - 44px);
        }
    </style>
</head>
<body>
    <div id="header">Tutorial 2: Leaflet on Mobile — Geolocation</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    <script>
        // Step 1: Initialize map with fitWorld() — shows full world before location is found
        var map = L.map('map').fitWorld();

        // Step 2: Add OpenStreetMap tile layer (replacing Mapbox per lab instructions)
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Step 3: Use locate with setView — zooms map to user's detected location
        map.locate({setView: true, maxZoom: 16});

        // Step 4: locationfound event — place marker and accuracy circle at user's position
        function onLocationFound(e) {
            var radius = e.accuracy / 2;

            L.marker(e.latlng).addTo(map)
                .bindPopup("You are within " + radius + " meters from this point").openPopup();

            L.circle(e.latlng, radius).addTo(map);
        }

        // Step 5: locationerror event — alert if geolocation fails or is denied
        function onLocationError(e) {
            alert(e.message);
        }

        map.on('locationfound', onLocationFound);
        map.on('locationerror', onLocationError);
    </script>
</body>
</html>
