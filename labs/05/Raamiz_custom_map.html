<!DOCTYPE html>
<html>
<head>
    <title>Raamiz Jafri's First Web Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* ── Header bar ── */
        #header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #500000 0%, #8b0000 100%); /* Aggie maroon */
            color: #fff;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        #header .title {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        #header .subtitle {
            font-size: 13px;
            opacity: 0.85;
        }

        /* ── Map ── */
        #map {
            position: absolute;
            top: 56px;
            bottom: 0;
            left: 0;
            right: 0;
        }

        /* ── Legend ── */
        .legend {
            background: white;
            padding: 10px 14px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            line-height: 1.8;
            font-size: 13px;
            color: #333;
            min-width: 190px;
        }
        .legend h4 {
            margin: 0 0 6px 0;
            font-size: 14px;
            color: #500000;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 3px;
        }
        .legend-circle {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.5);
            border: 2px solid red;
            flex-shrink: 0;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-pin {
            font-size: 16px;
            line-height: 1;
        }

        /* ── Coordinates display ── */
        #coords-display {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0,0,0,0.72);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            pointer-events: none;
            display: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div id="header">
        <div>
            <div class="title">🗺️ Raamiz Jafri's First Web Map</div>
            <div class="subtitle">College Station, TX — Texas A&amp;M University Campus</div>
        </div>
    </div>

    <!-- Map container -->
    <div id="map"></div>

    <!-- Coordinates bar (shown on click) -->
    <div id="coords-display"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

    <script>
        // ══════════════════════════════════════════════
        // 1. Initialize map — fitWorld() first, then locate
        // ══════════════════════════════════════════════
        var map = L.map('map').fitWorld();

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // ══════════════════════════════════════════════
        // 2. TAMU landmark coordinates
        // ══════════════════════════════════════════════
        var kyleField       = [30.6084, -96.3402];
        var omBuilding      = [30.6179, -96.3386];
        var academicBuilding = [30.6159, -96.3413];

        // ══════════════════════════════════════════════
        // 3. Geolocation (Tutorial 2 — locate method)
        // ══════════════════════════════════════════════
        map.locate({ setView: true, maxZoom: 16 });

        function onLocationFound(e) {
            var radius = e.accuracy / 2;
            L.marker(e.latlng).addTo(map)
                .bindPopup(
                    "<b>📍 Your Location</b><br>You are within <b>" +
                    Math.round(radius) + " meters</b> from this point."
                ).openPopup();
            L.circle(e.latlng, {
                radius: radius,
                color: '#3388ff',
                fillColor: '#3388ff',
                fillOpacity: 0.15
            }).addTo(map);
        }

        function onLocationError(e) {
            // If denied/unavailable, fall back to College Station campus view
            map.setView(kyleField, 15);
        }

        map.on('locationfound', onLocationFound);
        map.on('locationerror', onLocationError);

        // ══════════════════════════════════════════════
        // 4. Red circle around Kyle Field (Tutorial 1 — circle + popup)
        // ══════════════════════════════════════════════
        var kyleCircle = L.circle(kyleField, {
            color: 'red',
            fillColor: '#f03',
            fillOpacity: 0.4,
            radius: 250   // ~250m radius covers the stadium footprint
        }).addTo(map);

        kyleCircle.bindPopup(
            "<b>🏟️ Kyle Field</b><br>" +
            "Home of the Texas A&amp;M Aggies!<br>" +
            "<small>Coordinates: 30.6084°N, 96.3402°W</small>"
        );

        // ══════════════════════════════════════════════
        // 5. Custom Icons (Tutorial 3 — custom icon + popup)
        // ══════════════════════════════════════════════

        // --- O&M Building icon (maroon star/building style via DivIcon) ---
        var omIcon = L.divIcon({
            html: '<div style="' +
                    'background:#500000;' +
                    'color:white;' +
                    'width:34px;height:34px;' +
                    'border-radius:50% 50% 50% 0;' +
                    'transform:rotate(-45deg);' +
                    'border:3px solid #8b0000;' +
                    'box-shadow:0 2px 6px rgba(0,0,0,0.4);' +
                    'display:flex;align-items:center;justify-content:center;' +
                  '">' +
                    '<span style="transform:rotate(45deg);font-size:15px;">🏛️</span>' +
                  '</div>',
            iconSize: [34, 34],
            iconAnchor: [17, 34],
            popupAnchor: [0, -36],
            className: ''
        });

        // --- Academic Building icon (gold/dark style) ---
        var academicIcon = L.divIcon({
            html: '<div style="' +
                    'background:#b8860b;' +
                    'color:white;' +
                    'width:34px;height:34px;' +
                    'border-radius:50% 50% 50% 0;' +
                    'transform:rotate(-45deg);' +
                    'border:3px solid #8b6914;' +
                    'box-shadow:0 2px 6px rgba(0,0,0,0.4);' +
                    'display:flex;align-items:center;justify-content:center;' +
                  '">' +
                    '<span style="transform:rotate(45deg);font-size:15px;">🎓</span>' +
                  '</div>',
            iconSize: [34, 34],
            iconAnchor: [17, 34],
            popupAnchor: [0, -36],
            className: ''
        });

        // Place O&M Building marker
        L.marker(omBuilding, { icon: omIcon }).addTo(map)
            .bindPopup(
                "<b>🏛️ O&amp;M Building</b><br>" +
                "Oklahoma &amp; Main (O&amp;M) Building<br>" +
                "Texas A&amp;M University<br>" +
                "<small>Coordinates: 30.6179°N, 96.3386°W</small>"
            );

        // Place Academic Building marker
        L.marker(academicBuilding, { icon: academicIcon }).addTo(map)
            .bindPopup(
                "<b>🎓 Academic Building</b><br>" +
                "The iconic centerpiece of Texas A&amp;M's campus<br>" +
                "<small>Coordinates: 30.6159°N, 96.3413°W</small>"
            );

        // ══════════════════════════════════════════════
        // 6. Click event — show coordinates in popup AND bottom bar
        // ══════════════════════════════════════════════
        var coordsDisplay = document.getElementById('coords-display');
        var clickPopup = L.popup();

        function onMapClick(e) {
            var lat = e.latlng.lat.toFixed(5);
            var lng = e.latlng.lng.toFixed(5);

            // Popup on map
            clickPopup
                .setLatLng(e.latlng)
                .setContent(
                    "<b>📌 Clicked Location</b><br>" +
                    "Lat: <b>" + lat + "°</b><br>" +
                    "Lng: <b>" + lng + "°</b>"
                )
                .openOn(map);

            // Bottom bar display
            coordsDisplay.style.display = 'block';
            coordsDisplay.textContent = '📌 Clicked: ' + lat + '°N, ' + Math.abs(lng) + '°W';
        }

        map.on('click', onMapClick);

        // ══════════════════════════════════════════════
        // 7. Legend (added after map fully set up)
        // ══════════════════════════════════════════════
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML =
                '<h4>Map Legend</h4>' +
                '<div class="legend-item"><div class="legend-circle"></div> Kyle Field (circle)</div>' +
                '<div class="legend-item"><div class="legend-pin">🏛️</div> O&amp;M Building</div>' +
                '<div class="legend-item"><div class="legend-pin">🎓</div> Academic Building</div>' +
                '<div class="legend-item"><div class="legend-pin">📍</div> Your Location</div>' +
                '<div class="legend-item"><div class="legend-pin">📌</div> Click = coordinates</div>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
